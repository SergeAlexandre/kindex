{{ if .Values.ingress.enabled }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kindex.ingressName" . }}
  labels:
    {{- include "kindex.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.passthrough }}
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    haproxy.org/ssl-passthrough: "true"
    ingress.kubernetes.io/ssl-passthrough: "true"
    {{- end }}
    {{- with .Values.ingress.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.class }}
  rules:
    - host: {{ required "ingress.host must be defined!" .Values.ingress.host }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "kindex.serviceName" . }}
                port:
                  number: {{ .Values.server.bindPort }}
            path: /
            pathType: Prefix
{{ end }}


